<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Torneo de Fútbol</title>


<link
	href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
	rel="stylesheet">


<link rel="stylesheet" href="css/style.css">
</head>

<body>

	<div class="login-card">

		<div class="escudo">⚽</div>

		<h1>Torneo de Fútbol</h1>

		<p class="subtitle">Ingresá con tu cuenta de club</p>


		<div id="errorMsg" class="alert alert-danger" style="display: none;">
		</div>

		<div class="mb-3">
			<label class="form-label"> Usuario </label> <input type="text"
				id="username" class="form-control" placeholder="Nombre del club"
				autocomplete="off">
		</div>


		<div class="mb-4">
			<label class="form-label"> Contraseña </label> <input type="password"
				id="password" class="form-control" placeholder="••••••••">
		</div>

		<button id="btnLogin" class="btn btn-primary w-100" onclick="login()"> Ingresar</button>

		<div class="text-center mt-4">

			<a href="tabla.html" class="link-tabla"> Ver tabla de posiciones</a>

		</div>

	</div>

	<script
		src="https://cdn.jsdelivr.net/npm/jquery@3.7.0/dist/jquery.min.js"></script>

	<script src="js/login.js"></script>

</body>

</html>
